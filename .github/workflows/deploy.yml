name: Deploy NWC to Hostinger

# Se déclenche à chaque push sur main.
# Peut aussi être lancé manuellement depuis GitHub → Actions → "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Empêche 2 déploiements en parallèle sur la même branche (sinon écrasement).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ================================================================
  # Job 1 — Détecte quels dossiers ont changé (backend/frontend/les 2).
  # Évite de re-déployer ce qui n'a pas bougé.
  # ================================================================
  changes:
    name: Détection des changements
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ================================================================
  # Job 2 — DÉPLOIEMENT BACKEND Laravel
  #   1. Upload des fichiers backend/ vers ~/nwc_backend/ via rsync
  #   2. SSH → composer install + migrate --force + optimize
  # ================================================================
  deploy-backend:
    name: Backend Laravel
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Upload via rsync — plus rapide que scp + gère les diff incrémentaux.
      # --delete SUPPRIME sur le serveur les fichiers absents en local (miroir strict).
      # On EXCLUT tout ce qui doit rester tel quel côté prod :
      #   .env          → configuré manuellement sur Hostinger
      #   vendor/       → généré par composer install (post-deploy)
      #   node_modules/ → non pertinent côté PHP
      #   storage/      → contient logs + fichiers uploadés par les users
      #   bootstrap/cache/ → régénéré par artisan optimize
      #   *.log         → sécurité (jamais de log en repo)
      - name: Upload backend via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr --delete
            --exclude='.env'
            --exclude='vendor/'
            --exclude='node_modules/'
            --exclude='storage/'
            --exclude='bootstrap/cache/'
            --exclude='public/storage'
            --exclude='public/build/'
            --exclude='*.log'
            --exclude='.git*'
            --exclude='.DS_Store'
          path: backend/
          remote_path: /home/${{ secrets.HOSTINGER_USER }}/nwc_backend/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_key:  ${{ secrets.HOSTINGER_SSH_KEY }}

      # Post-deploy Laravel : dépendances + migration + cache.
      # `composer install --no-dev` = pas d'outils de dev en prod (économise ~40 Mo).
      # `--optimize-autoloader` = autoloader compilé (~30 % plus rapide).
      # `migrate --force` = passe sans prompt interactif.
      # `optimize` = config:cache + route:cache + view:cache combinés.
      - name: Post-deploy Laravel (composer + migrate + cache)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script_stop: true # arrête au premier échec
          script: |
            set -e
            cd ~/nwc_backend

            echo "→ Installation des dépendances Composer (prod uniquement)"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "→ Migration BDD"
            php artisan migrate --force

            echo "→ Recréation du lien symbolique storage (idempotent)"
            # Hostinger désactive exec() en PHP → on ne peut pas utiliser artisan storage:link.
            # On crée le lien directement avec ln, en le supprimant d'abord s'il existe.
            if [ ! -L public/storage ]; then
              rm -rf public/storage
              ln -s ../storage/app/public public/storage
              echo "  ✓ Lien créé : public/storage → ../storage/app/public"
            else
              echo "  ✓ Lien déjà présent"
            fi

            echo "→ Vidage caches"
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            echo "→ Re-cache production (perf)"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "✅ Backend déployé"

  # ================================================================
  # Job 3 — DÉPLOIEMENT FRONTEND React (build + upload dist/)
  # NB: attend que le backend soit fini pour éviter que Hostinger nous
  # rate-limit avec 2 connexions SSH simultanées (fail2ban-like).
  # ================================================================
  deploy-frontend:
    name: Frontend React
    needs: [changes, deploy-backend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer dépendances
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build production
        working-directory: frontend
        env:
          # Injecte l'URL de l'API de prod si besoin (à adapter).
          # VITE_API_URL: https://newwinechurch.ci/api
          NODE_ENV: production
        run: npm run build

      # Upload uniquement dist/* vers public_html.
      # NB : on ne met PAS --delete ici pour préserver un éventuel .htaccess
      # personnalisé (rewrite API → Laravel). Si tu veux un miroir strict,
      # ajoute --delete mais protège .htaccess avec --exclude='.htaccess'.
      - name: Upload build vers public_html
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr
            --exclude='.htaccess'
            --exclude='.well-known/'
          path: frontend/dist/
          remote_path: ${{ secrets.HOSTINGER_FRONTEND_PATH }}
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_key:  ${{ secrets.HOSTINGER_SSH_KEY }}

  # ================================================================
  # Job 4 — Notification finale (succès ou échec)
  # Log dans les Actions + envoi Discord (si secret configuré).
  # ================================================================
  notify:
    name: Notification
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Résumé
        id: summary
        run: |
          BE="${{ needs.deploy-backend.result }}"
          FE="${{ needs.deploy-frontend.result }}"
          echo "Backend  : $BE"
          echo "Frontend : $FE"

          # Détermine le statut global
          if [ "$BE" = "failure" ] || [ "$FE" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT   # rouge Discord
            echo "emoji=❌" >> $GITHUB_OUTPUT
          elif [ "$BE" = "success" ] || [ "$FE" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT    # vert Discord
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "color=10197915" >> $GITHUB_OUTPUT   # gris
            echo "emoji=⏭️" >> $GITHUB_OUTPUT
          fi

          # Sort en erreur si un des jobs a échoué (empêche le badge vert menteur)
          if [ "$BE" = "failure" ] || [ "$FE" = "failure" ]; then
            exit 1
          fi

      # === Discord webhook ===
      # Ne s'exécute que si le secret DISCORD_WEBHOOK est configuré.
      # On force un `if: always()` sur le job global mais on saute
      # l'appel Discord si le webhook n'est pas dispo (dev, forks…).
      - name: Notification Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Extrait auteur + message du commit (première ligne uniquement)
          COMMIT_MSG=$(git log -1 --pretty=%s || echo "N/A")
          COMMIT_AUTHOR="${{ github.actor }}"
          COMMIT_SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          STATUS="${{ steps.summary.outputs.status }}"
          COLOR="${{ steps.summary.outputs.color }}"
          EMOJI="${{ steps.summary.outputs.emoji }}"

          # Statut en français friendly
          case "$STATUS" in
            success) TITLE="$EMOJI Déploiement réussi — NWC";;
            failure) TITLE="$EMOJI Déploiement ÉCHOUÉ — NWC";;
            *)       TITLE="$EMOJI Déploiement ignoré — NWC";;
          esac

          # Backend/Frontend en emoji
          case "${{ needs.deploy-backend.result }}" in
            success) BE_ICON="✅";; failure) BE_ICON="❌";; skipped) BE_ICON="⏭️";;
            *) BE_ICON="⚫";;
          esac
          case "${{ needs.deploy-frontend.result }}" in
            success) FE_ICON="✅";; failure) FE_ICON="❌";; skipped) FE_ICON="⏭️";;
            *) FE_ICON="⚫";;
          esac

          # Payload Discord Rich Embed (JSON)
          PAYLOAD=$(cat <<JSON
          {
            "username": "NWC Deploy Bot",
            "avatar_url": "https://newwinechurch.ci/logos/logo_newwine.png",
            "embeds": [{
              "title": "$TITLE",
              "url": "$RUN_URL",
              "color": $COLOR,
              "fields": [
                { "name": "📝 Commit", "value": "[\`$COMMIT_SHA_SHORT\`]($COMMIT_URL) $COMMIT_MSG", "inline": false },
                { "name": "👤 Auteur", "value": "$COMMIT_AUTHOR", "inline": true },
                { "name": "🌿 Branche", "value": "\`${{ github.ref_name }}\`", "inline": true },
                { "name": "⚙️ Trigger", "value": "\`${{ github.event_name }}\`", "inline": true },
                { "name": "🔧 Backend", "value": "$BE_ICON ${{ needs.deploy-backend.result }}", "inline": true },
                { "name": "🎨 Frontend", "value": "$FE_ICON ${{ needs.deploy-frontend.result }}", "inline": true },
                { "name": "🔗 Détails", "value": "[Voir le run]($RUN_URL)", "inline": true }
              ],
              "footer": {
                "text": "New Wine Church · Auto-deploy CI/CD",
                "icon_url": "https://newwinechurch.ci/logos/logo_newwine.png"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          JSON
          )

          # Envoi webhook — silencieux, on log seulement l'échec.
          curl -sS -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK" \
            || echo "⚠️  Notif Discord échouée (webhook invalide ?)"
