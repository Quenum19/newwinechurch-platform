; ==============================================================
;  Supervisord — workers Laravel pour NWC en production.
;  À installer sur le serveur de prod :
;    sudo cp deploy/supervisord-nwc.conf /etc/supervisor/conf.d/nwc.conf
;    sudo supervisorctl reread
;    sudo supervisorctl update
;    sudo supervisorctl status
; ==============================================================

; --- Queue worker principal (jobs Mail, GeneratePdf, Notifications…) ---
[program:nwc-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/newwinechurch/backend/artisan queue:work --queue=default --sleep=3 --tries=3 --max-jobs=1000 --max-time=3600 --timeout=120
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/nwc-queue.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stopwaitsecs=130

; --- Scheduler (équivalent du cron Laravel) ---
[program:nwc-scheduler]
process_name=%(program_name)s
command=php /var/www/newwinechurch/backend/artisan schedule:work
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/nwc-scheduler.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5

; --- Reverb (WebSockets) — broadcast notifs temps réel ---
[program:nwc-reverb]
process_name=%(program_name)s
command=php /var/www/newwinechurch/backend/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/nwc-reverb.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
