# ==============================================================
#  NWC — Nginx reverse proxy (HTTPS + HSTS + static + PHP-FPM)
#  Le SSL est géré par certbot/letsencrypt sur l'hôte ou ici.
# ==============================================================

server {
    listen 80;
    server_name newinechurch.org www.newinechurch.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name newinechurch.org www.newinechurch.org;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # === HSTS (force HTTPS pour 6 mois) ===
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # === Securité ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 25m;

    # === Logs ===
    access_log /var/log/nginx/nwc-access.log;
    error_log  /var/log/nginx/nwc-error.log;

    # === Routes API → Laravel via PHP-FPM ===
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # === WebSocket Reverb ===
    location /reverb/ {
        proxy_pass http://worker:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # === Cache agressif sur les assets statiques ===
    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|svg|woff2|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
