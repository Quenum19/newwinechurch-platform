; ==============================================================
;  PHP — Configuration production NWC.
; ==============================================================

; Mémoire et limites
memory_limit = 256M
max_execution_time = 60
post_max_size = 25M
upload_max_filesize = 25M
max_input_vars = 3000

; Sécurité
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; OPcache (CRITIQUE en prod)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0           ; cache figé en prod (vider via php artisan optimize)
opcache.save_comments = 1
opcache.interned_strings_buffer = 16
opcache.preload = /var/www/html/storage/framework/preload.php
opcache.preload_user = www-data

; Realpath cache (gain I/O)
realpath_cache_size = 4M
realpath_cache_ttl = 600

; Sessions sécurisées (cookies httponly + secure géré par Laravel)
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

date.timezone = Africa/Abidjan
