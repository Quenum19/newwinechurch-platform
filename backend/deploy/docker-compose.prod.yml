# ==============================================================
#  NWC — Stack production Docker.
#  Lance : docker compose -f deploy/docker-compose.prod.yml up -d
# ==============================================================

services:

  # --- PHP-FPM (backend Laravel) ---
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: nwc-backend:latest
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ../storage/app:/var/www/html/storage/app
      - ../storage/logs:/var/www/html/storage/logs
    networks: [nwc]
    depends_on: [db, redis]

  # --- Queue worker + Scheduler + Reverb (via supervisord) ---
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: nwc-backend:latest
    restart: unless-stopped
    env_file: ../.env
    command: ["supervisord", "-n", "-c", "/etc/supervisor/supervisord.conf"]
    volumes:
      - ../storage/app:/var/www/html/storage/app
      - ../storage/logs:/var/www/html/storage/logs
      - ./supervisord-docker.conf:/etc/supervisor/conf.d/nwc.conf:ro
    networks: [nwc]
    depends_on: [db, redis]

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../public:/var/www/html/public:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks: [nwc]
    depends_on: [app]

  # --- MariaDB ---
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
    networks: [nwc]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Redis (cache, queue, sessions) ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks: [nwc]

networks:
  nwc:
    driver: bridge

volumes:
  db_data:
  redis_data:
