; ==============================================================
;  PHP per-directory overrides (apache/fpm/cgi)
;  Lu uniquement par mod_php / FastCGI / CGI — PAS par `php artisan serve`.
;
;  Pour augmenter les limites en local Wamp : éditer aussi
;  C:\wamp64\bin\php\phpX.Y\php.ini puis redémarrer Wamp.
; ==============================================================

; Permettre des vidéos (bal Dancing Stars, prêches) jusqu'à ~120 Mo.
; NB: sur Hostinger, la limite serveur globale peut plafonner cette
; valeur — vérifier via /admin > PHP > Configuration si besoin.
upload_max_filesize = 120M

; Permettre les uploads multi-fichiers cumulés + vidéos.
; (post_max_size doit être >= upload_max_filesize)
post_max_size = 320M

; Mémoire suffisante pour Intervention Image avec photos 6000×4000 px.
memory_limit = 256M

; Pas de timeout sur les uploads lourds (apache).
max_execution_time = 300
max_input_time = 300
