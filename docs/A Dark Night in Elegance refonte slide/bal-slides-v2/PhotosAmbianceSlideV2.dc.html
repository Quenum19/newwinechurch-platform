<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwKen { 0%{transform:scale(1.12) translate(-1.4%,1%)} 100%{transform:scale(1.02) translate(1.4%,-1%)} }
  @keyframes nwFlashCam { 0%,100%{opacity:0} 3%{opacity:.8} 8%{opacity:0} }
  @keyframes nwFade { 0%{opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{opacity:0} }
  @keyframes nwTwinkle { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 30%, #211a10 0%, #0d0a06 56%, #060402 100%);"></div>

  <sc-if value="{{ hasPhotos }}" hint-placeholder-val="{{ false }}">
    <sc-for list="{{ slides }}" as="s" hint-placeholder-count="3"><div style="{{ s.style }}"></div></sc-for>
    <div style="position:absolute; inset:0; background:#fff; animation:nwFlashCam {{ cycle }}s ease-out infinite; pointer-events:none;"></div>
  </sc-if>

  <sc-if value="{{ empty }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
      <div style="font-family:'Cinzel',serif; font-weight:500; font-size:26px; letter-spacing:.5em; text-indent:.5em; color:#C9A961;">MOMENTS DE LA SOIRÉE</div>
      <div style="font-family:'Great Vibes',cursive; font-size:150px; color:#EECF80; line-height:.9; text-shadow:0 0 70px rgba(201,169,97,.4);">Souvenirs</div>
      <div style="font-family:'Playfair Display',serif; font-style:italic; font-size:30px; color:#F0E6CF; margin-top:12px;">Vos plus belles photos, en direct</div>
    </div>
  </sc-if>

  <!-- scrim + overlay -->
  <div style="position:absolute; inset:0; background:linear-gradient(0deg, rgba(0,0,0,.82) 0%, rgba(0,0,0,.3) 26%, transparent 55%);"></div>
  <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.85); box-shadow:inset 0 0 60px rgba(0,0,0,.3); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; left:60px; bottom:56px; display:flex; align-items:center; gap:20px;">
    <span style="font-family:'Anton',sans-serif; font-size:44px; color:#F5E6C8; letter-spacing:.02em;">#BalNWC2026</span>
    <span style="font-family:'Cinzel',serif; font-size:24px; color:#C9A961;">✦</span>
    <span style="font-family:'Playfair Display',serif; font-style:italic; font-size:26px; color:#D9CBB0;">A Dark Night in Elegance</span>
  </div>
  <sc-if value="{{ hasPhotos }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; right:60px; bottom:60px; font-family:'Cinzel',serif; font-weight:600; font-size:22px; letter-spacing:.14em; color:#E6C877;">{{ counter }}</div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ photos?: ({ url: string } | string)[] }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  state={ idx:0 };
  componentDidMount(){ const photos=(this.props.state??{}).photos??[]; if(photos.length>1){ this._iv=setInterval(()=>this.setState(s=>({idx:s.idx+1})),6000);} }
  componentWillUnmount(){ clearInterval(this._iv); }
  renderVals(){
    const st=this.props.state??{}; const photos=st.photos??[];
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"14px",height:"14px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 8px rgba(214,178,95,.6)"};
    const corner={tl:this.css({...cb,top:"44px",left:"44px"}),tr:this.css({...cb,top:"44px",right:"44px"}),bl:this.css({...cb,bottom:"44px",left:"44px"}),br:this.css({...cb,bottom:"44px",right:"44px"})};

    const cur = photos.length ? this.state.idx % photos.length : 0;
    // n'affiche que la photo courante (Ken Burns + fade)
    const slides = photos.length ? [{ style:this.css({ position:"absolute", inset:"0",
      backgroundImage:`url("${photos[cur].url||photos[cur]}")`, backgroundSize:"cover", backgroundPosition:"center",
      animation:"nwKen 8s ease-in-out infinite alternate, nwFade 6s ease-in-out infinite" })}] : [];

    return { root, corner, slides,
      hasPhotos: photos.length>0, empty: photos.length===0,
      cycle: 6, counter: photos.length ? `${cur+1} / ${photos.length}` : "" };
  }
}
</script>
</body>
</html>
