<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<script src="./image-slot.js"></script>
<style>
  @keyframes nwOpenL { 0%,8%{transform:translateX(0)} 42%,58%{transform:translateX(-101%)} 92%,100%{transform:translateX(0)} }
  @keyframes nwOpenR { 0%,8%{transform:translateX(0)} 42%,58%{transform:translateX(101%)} 92%,100%{transform:translateX(0)} }
  @keyframes nwCurtainSheen { 0%{transform:translateX(-140%) skewX(-12deg)} 100%{transform:translateX(260%) skewX(-12deg)} }
  @keyframes nwSpotCross { 0%{transform:translateX(-44vw) rotate(-14deg)} 100%{transform:translateX(44vw) rotate(14deg)} }
  @keyframes nwGlowP { 0%,100%{text-shadow:0 0 70px rgba(201,169,97,.45),0 3px 6px rgba(0,0,0,.7)} 50%{text-shadow:0 0 140px rgba(201,169,97,.75),0 3px 6px rgba(0,0,0,.7)} }
  @keyframes nwStagePulse { 0%,100%{opacity:.4; transform:translate(-50%,-50%) scale(1)} 50%{opacity:.75; transform:translate(-50%,-50%) scale(1.1)} }
  @keyframes nwTwinkle { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 40%, #2a0f14 0%, #12080a 58%, #060402 100%);"></div>
  <!-- FOND SCÈNE : vidéo des danseurs (révélée quand le rideau s'ouvre) -->
  <div style="position:absolute; inset:0; z-index:2; overflow:hidden;">
    <sc-if value="{{ hasVideo }}" hint-placeholder-val="{{ false }}">
      <video src="{{ videoSrc }}" autoplay muted loop playsinline style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"></video>
    </sc-if>
    <sc-if value="{{ noVideo }}" hint-placeholder-val="{{ true }}">
      <image-slot id="dancing-stage-video" shape="rect" fit="cover" placeholder="Vidéo des danseurs (fond, révélé par le rideau)"></image-slot>
    </sc-if>
    <div style="position:absolute; inset:0; pointer-events:none; background:radial-gradient(70% 70% at 50% 45%, transparent 40%, rgba(0,0,0,.55) 100%);"></div>
  </div>

  <!-- lueur de scène derrière le rideau -->
  <div style="position:absolute; top:50%; left:50%; width:1200px; height:800px; background:radial-gradient(closest-side, rgba(230,200,119,.2), transparent 70%); animation:nwStagePulse 5s ease-in-out infinite;"></div>
  <sc-for list="{{ twinkles }}" as="t" hint-placeholder-count="10"><div style="{{ t.style }}">✦</div></sc-for>

  <!-- spots croisés -->
  <div style="position:absolute; top:-20%; left:38%; width:200px; height:150%; background:linear-gradient(180deg, rgba(230,200,119,.18), transparent 74%); filter:blur(9px); animation:nwSpotCross 7s ease-in-out infinite alternate;"></div>
  <div style="position:absolute; top:-20%; right:38%; width:200px; height:150%; background:linear-gradient(180deg, rgba(230,200,119,.15), transparent 74%); filter:blur(9px); animation:nwSpotCross 8.5s ease-in-out infinite alternate-reverse;"></div>

  <!-- TITRE (toujours au-dessus, lisible rideau ouvert ou fermé) -->
  <div style="position:absolute; inset:0; z-index:6; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none;">
    <div style="font-family:'Cinzel',serif; font-weight:500; font-size:34px; letter-spacing:.52em; text-indent:.52em; color:#E6C877; text-shadow:0 2px 12px rgba(0,0,0,.9); margin-bottom:6px;">LE RIDEAU SE LÈVE</div>
    <div style="font-family:'Anton',sans-serif; font-size:280px; line-height:.82; text-transform:uppercase; background:linear-gradient(180deg,#FFF6D8,#E6C877 48%,#8a6d2f); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:nwGlowP 5s ease-in-out infinite; {{ titleExtra }}">Dancing<br>Stars</div>
  </div>

  <!-- RIDEAU : deux pans qui s'ouvrent puis se ferment -->
  <div style="position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden;">
    <div style="position:absolute; top:0; bottom:0; left:0; width:52%; {{ velvet }}; box-shadow:inset -30px 0 40px rgba(0,0,0,.6); animation:nwOpenL {{ cycle }}s ease-in-out infinite;">
      <div style="position:absolute; top:0; bottom:0; right:0; width:60px; background:linear-gradient(90deg,transparent,rgba(255,230,170,.14));"></div>
      <div style="position:absolute; top:0; bottom:0; left:0; width:50px; background:linear-gradient(90deg,transparent,rgba(255,230,170,.12),transparent); animation:nwCurtainSheen 6s linear infinite;"></div>
    </div>
    <div style="position:absolute; top:0; bottom:0; right:0; width:52%; {{ velvet }}; box-shadow:inset 30px 0 40px rgba(0,0,0,.6); animation:nwOpenR {{ cycle }}s ease-in-out infinite;">
      <div style="position:absolute; top:0; bottom:0; left:0; width:60px; background:linear-gradient(270deg,transparent,rgba(255,230,170,.14));"></div>
      <div style="position:absolute; top:0; bottom:0; left:0; width:50px; background:linear-gradient(90deg,transparent,rgba(255,230,170,.12),transparent); animation:nwCurtainSheen 7s linear infinite 1s;"></div>
    </div>
  </div>
  <!-- lambrequin haut -->
  <div style="position:absolute; top:0; left:0; right:0; height:90px; z-index:5; {{ velvet }}; box-shadow:0 8px 24px rgba(0,0,0,.6); border-bottom:3px solid rgba(214,178,95,.6);"></div>

  <div style="position:absolute; inset:28px; z-index:7; border:3px solid rgba(214,178,95,.9); box-shadow:inset 0 0 80px rgba(0,0,0,.4); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{}&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  state={ mode:0 };
  componentDidMount(){ this._iv=setInterval(()=>this.setState(s=>({mode:(s.mode+1)%3})),3000); }
  componentWillUnmount(){ clearInterval(this._iv); }
  renderVals(){
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"20px",height:"20px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 12px rgba(214,178,95,.7)",zIndex:8};
    const corner={tl:this.css({...cb,top:"56px",left:"56px"}),tr:this.css({...cb,top:"56px",right:"56px"}),bl:this.css({...cb,bottom:"56px",left:"56px"}),br:this.css({...cb,bottom:"56px",right:"56px"})};
    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
    const twinkles=Array.from({length:10},(_,i)=>{const left=rnd(i*2.7)*80+10;const top=rnd(i*3.9)*60+16;const size=18+rnd(i*1.5)*22;const dur=2.5+rnd(i*4)*2;
      return {style:`position:absolute;left:${left}%;top:${top}%;z-index:5;font-family:'Cinzel',serif;font-size:${size}px;color:rgba(230,200,119,.5);animation:nwTwinkle ${dur}s ease-in-out infinite;animation-delay:${(-rnd(i*3)*dur).toFixed(2)}s;`};});

    // velours à plis
    const velvet = "background:repeating-linear-gradient(90deg,#3a121b 0px,#6b1f2c 26px,#4a1622 52px,#2a0f14 78px)";

    // le "comportement change" : la vitesse/expression du titre varie par mode
    const modes=[
      "transform:scale(1)",
      "transform:scale(1.04); letter-spacing:.02em",
      "transform:scale(1); filter:drop-shadow(0 0 30px rgba(230,200,119,.6))",
    ];
    const video = (this.props.state??{}).video_url ?? "";
    return { root, corner, twinkles, velvet, cycle: 9, titleExtra: modes[this.state.mode],
      hasVideo: !!video, noVideo: !video, videoSrc: video };
  }
}
</script>
</body>
</html>
