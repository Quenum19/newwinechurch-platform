<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  @keyframes nwNoirIn { 0%{opacity:0} 100%{opacity:1} }
  @keyframes nwNoirPulse { 0%,100%{opacity:.12} 50%{opacity:.28} }
</style>
</helmet>

<div style="{{ root }}">
  <!-- fondu au noir 400ms -->
  <div style="position:absolute; inset:0; background:#000; animation:nwNoirIn .4s ease forwards;"></div>
  <!-- discret losange or qui respire (repère régie, quasi invisible public) -->
  <div style="position:absolute; left:50%; bottom:40px; transform:translateX(-50%); width:8px; height:8px; background:#C9A961; transform-origin:center; animation:nwNoirPulse 3s ease-in-out infinite;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{}&quot;}}">
class Component extends DCLogic {
  renderVals(){
    return { root: "position:relative; width:1920px; height:1080px; overflow:hidden; background:#000;" };
  }
}
</script>
</body>
</html>
