<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwRise { 0%{transform:translateY(20px);opacity:0} 12%{opacity:.85} 88%{opacity:.85} 100%{transform:translateY(-1080px);opacity:0} }
  @keyframes nwHalo { 0%,100%{opacity:.4; transform:translate(-50%,-50%) scale(1)} 50%{opacity:.72; transform:translate(-50%,-50%) scale(1.08)} }
  @keyframes nwChand { 0%,100%{transform:translateX(-50%) rotate(-1.4deg)} 50%{transform:translateX(-50%) rotate(1.4deg)} }
  @keyframes nwGreatIn { 0%{opacity:0; transform:translateY(24px) scale(.96)} 100%{opacity:1; transform:translateY(0) scale(1)} }
  @keyframes nwScript { 0%,100%{text-shadow:0 0 60px rgba(201,169,97,.4),0 3px 10px rgba(0,0,0,.6)} 50%{text-shadow:0 0 110px rgba(201,169,97,.65),0 3px 10px rgba(0,0,0,.6)} }
  @keyframes nwTwinkle { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 26%, #211a10 0%, #0d0a06 56%, #060402 100%);"></div>
  <!-- lustre suspendu -->
  <div style="position:absolute; top:-30px; left:50%; transform-origin:top center; animation:nwChand 7s ease-in-out infinite;">
    <svg width="220" height="260" viewBox="0 0 220 260">
      <line x1="110" y1="0" x2="110" y2="60" stroke="rgba(214,178,95,.6)" stroke-width="2"/>
      <ellipse cx="110" cy="90" rx="90" ry="26" fill="none" stroke="rgba(214,178,95,.55)" stroke-width="2"/>
      <ellipse cx="110" cy="130" rx="62" ry="18" fill="none" stroke="rgba(214,178,95,.45)" stroke-width="2"/>
      <g fill="#E6C877">
        <circle cx="30" cy="96" r="4"/><circle cx="60" cy="104" r="4"/><circle cx="110" cy="108" r="5"/><circle cx="160" cy="104" r="4"/><circle cx="190" cy="96" r="4"/>
        <circle cx="66" cy="140" r="4"/><circle cx="110" cy="146" r="5"/><circle cx="154" cy="140" r="4"/>
      </g>
      <g stroke="rgba(214,178,95,.5)" stroke-width="1.6" fill="none">
        <path d="M30 96 Q22 130 34 150"/><path d="M190 96 Q198 130 186 150"/>
      </g>
    </svg>
  </div>
  <!-- halo qui respire -->
  <div style="position:absolute; top:52%; left:50%; width:1000px; height:600px; background:radial-gradient(closest-side, rgba(230,200,119,.16), transparent); animation:nwHalo 6s ease-in-out infinite;"></div>

  <sc-for list="{{ particles }}" as="p" hint-placeholder-count="22"><div style="{{ p.style }}"></div></sc-for>
  <sc-for list="{{ twinkles }}" as="t" hint-placeholder-count="8"><div style="{{ t.style }}">✦</div></sc-for>

  <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.9); box-shadow:inset 0 0 60px rgba(0,0,0,.3); pointer-events:none;"></div>
  <div style="position:absolute; inset:30px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 120px;">
    <div style="font-family:'Great Vibes',cursive; font-size:300px; line-height:.86; color:#EECF80; margin:0 0 6px; animation:nwGreatIn 1.4s cubic-bezier(.16,1,.3,1) both, nwScript 6s ease-in-out 1.4s infinite;">Bienvenue</div>
    <div style="width:460px; height:2px; background:linear-gradient(90deg,transparent,#C9A961,transparent); margin-bottom:30px;"></div>
    <div style="font-family:'Playfair Display',serif; font-style:italic; font-size:46px; line-height:1.5; color:#F5E6C8; max-width:1200px;">{{ welcomeText }}</div>

    <sc-if value="{{ hasSpeaker }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; align-items:center; gap:20px; margin-top:44px; padding:14px 30px; border:1px solid rgba(214,178,95,.6); border-radius:999px; background:linear-gradient(180deg, rgba(33,26,16,.6), rgba(13,10,6,.6));">
        <div style="{{ speakerAvatar }}">{{ speakerInitial }}</div>
        <div style="text-align:left;">
          <div style="font-family:'Cinzel',serif; font-weight:600; font-size:24px; color:#F5E6C8; letter-spacing:.06em;">{{ speakerName }}</div>
          <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:20px; color:#C9A961;">{{ speakerRole }}</div>
        </div>
      </div>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ event?: { title?: string }; welcome_text?: string; speaker?: { name?: string; role?: string; photo?: string } }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  renderVals(){
    const st=this.props.state??{}; const sp=st.speaker??null; const event=st.event??{};
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"14px",height:"14px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 8px rgba(214,178,95,.6)"};
    const corner={tl:this.css({...cb,top:"44px",left:"44px"}),tr:this.css({...cb,top:"44px",right:"44px"}),bl:this.css({...cb,bottom:"44px",left:"44px"}),br:this.css({...cb,bottom:"44px",right:"44px"})};
    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};

    const particles=Array.from({length:22},(_,i)=>{const size=2+rnd(i*1.3)*3.5;const left=rnd(i*2.1)*100;const dur=10+rnd(i*3.7)*9;const delay=-rnd(i*5.2)*dur;const y=200+rnd(i*1.9)*820;
      return {style:`position:absolute;left:${left}%;top:${y}px;width:${size}px;height:${size}px;border-radius:50%;background:radial-gradient(circle,#FFE9A8,rgba(201,169,97,.12));box-shadow:0 0 ${size*3}px rgba(230,200,119,.65);animation:nwRise ${dur}s linear infinite;animation-delay:${delay}s;`};});
    const twinkles=Array.from({length:8},(_,i)=>{const left=rnd(i*2.7)*90+5;const top=rnd(i*3.9)*70+8;const size=14+rnd(i*1.5)*18;const dur=2.5+rnd(i*4)*2;
      return {style:`position:absolute;left:${left}%;top:${top}%;font-family:'Cinzel',serif;font-size:${size}px;color:rgba(230,200,119,.55);animation:nwTwinkle ${dur}s ease-in-out infinite;animation-delay:${(-rnd(i*3)*dur).toFixed(2)}s;`};});

    const av={ display:"flex", alignItems:"center", justifyContent:"center", width:"64px", height:"64px", borderRadius:"50%",
      background: sp&&sp.photo?`url("${sp.photo}") center/cover`:"linear-gradient(135deg,#8B1A2F,#5f1720)", border:"2px solid rgba(214,178,95,.8)",
      fontFamily:"'Cinzel',serif", fontWeight:600, fontSize:"28px", color:"#F5E6C8" };

    return { root, corner, particles, twinkles,
      welcomeText: st.welcome_text ?? "C'est un honneur de vous recevoir en cette soirée de prestige. Que cette nuit soit à la hauteur de votre élégance.",
      hasSpeaker: !!sp,
      speakerAvatar: this.css(av),
      speakerInitial: sp&&sp.photo?"":((sp&&sp.name||"?").charAt(0).toUpperCase()),
      speakerName: sp&&sp.name||"", speakerRole: sp&&sp.role||"",
    };
  }
}
</script>
</body>
</html>
