<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<script src="./image-slot.js"></script>
<style>
  @keyframes nwRise { 0%{transform:translateY(20px);opacity:0} 12%{opacity:.9} 88%{opacity:.9} 100%{transform:translateY(-1080px);opacity:0} }
  @keyframes nwGlow { 0%,100%{text-shadow:0 0 70px rgba(201,169,97,.4),0 3px 6px rgba(0,0,0,.85),0 0 22px rgba(214,178,95,.35)} 50%{text-shadow:0 0 120px rgba(201,169,97,.6),0 3px 6px rgba(0,0,0,.85),0 0 30px rgba(214,178,95,.5)} }
  @keyframes nwDot { 0%,100%{opacity:.25; transform:scale(.8)} 50%{opacity:1; transform:scale(1.25)} }
  @keyframes nwBreathe { 0%,100%{opacity:.72} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <!-- IMAGE DE FOND (dépose une photo du bal ici) -->
  <div style="position:absolute; inset:0;">
    <image-slot id="default-bg-photo" shape="rect" fit="cover" placeholder="Dépose ici une photo du bal (fond plein écran)"></image-slot>
  </div>
  <!-- scrims de lisibilité (au-dessus de l'image, cliquables au travers) -->
  <div style="position:absolute; inset:0; pointer-events:none; background:radial-gradient(120% 100% at 50% 42%, rgba(10,8,6,.35) 0%, rgba(6,4,2,.72) 60%, rgba(4,3,2,.9) 100%);"></div>
  <div style="position:absolute; inset:0; pointer-events:none; background:linear-gradient(0deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.45) 30%, transparent 62%);"></div>

  <sc-for list="{{ particles }}" as="p" hint-placeholder-count="26"><div style="{{ p.style }}"></div></sc-for>

  <div style="position:absolute; inset:28px; border:3px solid rgba(214,178,95,.92); box-shadow:0 0 30px rgba(0,0,0,.5), inset 0 0 80px rgba(0,0,0,.4); pointer-events:none;"></div>
  <div style="position:absolute; inset:40px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none;">
    <div style="font-family:'Cinzel',serif; font-weight:600; font-size:38px; letter-spacing:.6em; text-indent:.6em; color:#E6C877; text-shadow:0 2px 10px rgba(0,0,0,.9);">NEW WINE CHURCH</div>

    <div style="font-family:'Anton',sans-serif; font-size:210px; line-height:.92; letter-spacing:.02em; text-transform:uppercase; color:#ECCE7D; background:linear-gradient(180deg,#FFF6D8 0%,#E6C877 46%,#C9A961 64%,#8a6d2f 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-top:20px; animation:nwGlow 6s ease-in-out infinite;">A DARK NIGHT</div>

    <div style="display:flex; align-items:center; justify-content:center; gap:36px; margin:12px 0 6px;">
      <span style="width:170px; height:2px; background:rgba(214,178,95,.8);"></span>
      <span style="font-family:'Cinzel',serif; font-weight:500; font-size:44px; letter-spacing:.4em; text-indent:.4em; color:#E6C877; text-shadow:0 2px 8px rgba(0,0,0,.9);">IN</span>
      <span style="width:170px; height:2px; background:rgba(214,178,95,.8);"></span>
    </div>
    <div style="font-family:'Great Vibes',cursive; font-size:220px; line-height:.82; color:#EECF80; text-shadow:0 0 80px rgba(201,169,97,.5),0 4px 14px rgba(0,0,0,.85);">Elegance</div>

    <div style="font-family:'Playfair Display',serif; font-style:italic; font-size:44px; color:#F5E6C8; margin-top:32px; text-shadow:0 2px 10px rgba(0,0,0,.9);">{{ subtitle }}</div>

  </div>

  <div style="position:absolute; left:0; right:0; bottom:80px; text-align:center; pointer-events:none; font-family:'Cinzel',serif; font-weight:600; font-size:28px; letter-spacing:.5em; text-indent:.5em; color:#E6C877; text-shadow:0 2px 10px rgba(0,0,0,.95);">{{ eventTag }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ event?: { cover_image?: string; title?: string; subtitle?: string; tag?: string }; status_line?: string }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  renderVals() {
    const st = this.props.state ?? {};
    const event = st.event ?? {};
    const root = "position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cornerBase = { position:"absolute", width:"20px", height:"20px", background:"#E6C877", transform:"rotate(45deg)", boxShadow:"0 0 12px rgba(214,178,95,.7)" };
    const corner = { tl:this.css({ ...cornerBase, top:"56px", left:"56px" }), tr:this.css({ ...cornerBase, top:"56px", right:"56px" }), bl:this.css({ ...cornerBase, bottom:"56px", left:"56px" }), br:this.css({ ...cornerBase, bottom:"56px", right:"56px" }) };
    const rnd = (s)=>{ let x=Math.sin(s)*10000; return x-Math.floor(x); };
    const particles = Array.from({length:26}, (_,i)=>{
      const size = 2 + rnd(i*1.3)*4; const left = rnd(i*2.1)*100; const dur = 9 + rnd(i*3.7)*10;
      const delay = -rnd(i*5.2)*dur; const startY = 200 + rnd(i*1.9)*880;
      return { style: `position:absolute; left:${left}%; top:${startY}px; width:${size}px; height:${size}px; border-radius:50%; background:radial-gradient(circle,#FFE9A8,rgba(201,169,97,.15)); box-shadow:0 0 ${size*3}px rgba(230,200,119,.7); animation:nwRise ${dur}s linear infinite; animation-delay:${delay}s; pointer-events:none;` };
    });
    return { root, corner, particles,
      subtitle: event.subtitle ?? "Une nuit de prestige, d'élégance et de souvenirs inoubliables.",
      statusLine: st.status_line ?? "L'ÉVÉNEMENT COMMENCE BIENTÔT",
      eventTag: event.tag ?? "24 JUILLET · LA MAISON DE LA DESTINÉE",
    };
  }
}
</script>
</body>
</html>
