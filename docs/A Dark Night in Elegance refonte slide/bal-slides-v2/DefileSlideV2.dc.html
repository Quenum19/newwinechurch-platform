<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwBeamA { 0%,100%{transform:rotate(-16deg); opacity:.4} 50%{transform:rotate(6deg); opacity:.8} }
  @keyframes nwBeamB { 0%,100%{transform:rotate(14deg); opacity:.35} 50%{transform:rotate(-8deg); opacity:.7} }
  @keyframes nwWalkLady { 0%{transform:translateX(-560px) scale(.62); opacity:0} 12%{opacity:.9} 84%{opacity:.9} 100%{transform:translateX(560px) scale(1.28); opacity:0} }
  @keyframes nwGown { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
  @keyframes nwGlowP { 0%,100%{text-shadow:0 0 70px rgba(201,169,97,.4),0 3px 6px rgba(0,0,0,.75)} 50%{text-shadow:0 0 140px rgba(201,169,97,.7),0 3px 6px rgba(0,0,0,.75)} }
  @keyframes nwTwinkle { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 6%, #1a0f10 0%, #0d0a06 56%, #060402 100%);"></div>

  <!-- SCÈNE + tapis rouge en perspective -->
  <div style="position:absolute; inset:0; perspective:1200px; overflow:hidden;">
    <div style="position:absolute; left:50%; bottom:0; width:760px; height:820px; transform:translateX(-50%) rotateX(64deg); transform-origin:bottom center; background:linear-gradient(180deg, #5f1720 0%, #8B1A2F 55%, #b0263f 100%); box-shadow:0 0 160px rgba(139,26,47,.7); border-left:4px solid rgba(230,200,119,.55); border-right:4px solid rgba(230,200,119,.55);"></div>
    <!-- mannequins (silhouettes féminines) qui défilent -->
    <div style="position:absolute; left:50%; bottom:120px; transform-style:preserve-3d;">
      <sc-for list="{{ ladies }}" as="l" hint-placeholder-count="3">
        <div style="{{ l.wrap }}">
          <svg width="150" height="360" viewBox="0 0 150 360" style="animation:nwGown 3.6s ease-in-out infinite;">
            <circle cx="75" cy="42" r="26" fill="#050303"/>
            <path d="M75 66 L96 120 L86 150 L92 340 Q75 356 58 340 L64 150 L54 120 Z" fill="#050303"/>
            <path d="M92 340 Q75 300 58 340 L52 356 L98 356 Z" fill="#050303"/>
          </svg>
        </div>
      </sc-for>
    </div>
  </div>

  <!-- projecteurs cohérents (4 faisceaux depuis le haut) -->
  <div style="position:absolute; top:-16%; left:50%; width:260px; height:150%; transform-origin:top center; background:linear-gradient(180deg, rgba(230,200,119,.24), transparent 74%); filter:blur(5px); animation:nwBeamA 6s ease-in-out infinite;"></div>
  <div style="position:absolute; top:-16%; left:32%; width:180px; height:150%; transform-origin:top center; background:linear-gradient(180deg, rgba(230,200,119,.16), transparent 74%); filter:blur(7px); animation:nwBeamB 7s ease-in-out infinite;"></div>
  <div style="position:absolute; top:-16%; right:32%; width:180px; height:150%; transform-origin:top center; background:linear-gradient(180deg, rgba(230,200,119,.16), transparent 74%); filter:blur(7px); animation:nwBeamA 8s ease-in-out infinite;"></div>
  <div style="position:absolute; inset:0; background:radial-gradient(62% 62% at 50% 40%, transparent 42%, rgba(0,0,0,.6) 100%);"></div>

  <sc-for list="{{ twinkles }}" as="t" hint-placeholder-count="8"><div style="{{ t.style }}">✦</div></sc-for>

  <div style="position:absolute; inset:28px; border:3px solid rgba(214,178,95,.92); box-shadow:inset 0 0 80px rgba(0,0,0,.4); pointer-events:none;"></div>
  <div style="position:absolute; inset:40px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; left:0; right:0; top:150px; display:flex; flex-direction:column; align-items:center; text-align:center;">
    <div style="font-family:'Playfair Display',serif; font-style:italic; font-size:46px; color:#F5E6C8; text-shadow:0 2px 12px rgba(0,0,0,.9);">Place à l'élégance</div>
    <div style="display:flex; align-items:center; gap:50px; margin-top:6px;">
      <span style="font-family:'Cinzel',serif; font-size:80px; color:#E6C877; animation:nwTwinkle 3s ease-in-out infinite;">★</span>
      <span style="font-family:'Anton',sans-serif; font-size:220px; letter-spacing:.05em; text-transform:uppercase; background:linear-gradient(180deg,#FFF6D8,#E6C877 50%,#8a6d2f); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:nwGlowP 5s ease-in-out infinite;">Défilé</span>
      <span style="font-family:'Cinzel',serif; font-size:80px; color:#E6C877; animation:nwTwinkle 3s ease-in-out infinite 1.5s;">★</span>
    </div>
    <div style="font-family:'Cinzel',serif; font-weight:500; font-size:34px; letter-spacing:.4em; text-indent:.4em; color:#E6C877; margin-top:14px; text-shadow:0 2px 10px rgba(0,0,0,.9);">{{ subtitle }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ subtitle?: string }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  renderVals(){
    const st=this.props.state??{};
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"20px",height:"20px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 12px rgba(214,178,95,.7)"};
    const corner={tl:this.css({...cb,top:"56px",left:"56px"}),tr:this.css({...cb,top:"56px",right:"56px"}),bl:this.css({...cb,bottom:"56px",left:"56px"}),br:this.css({...cb,bottom:"56px",right:"56px"})};
    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
    const ladies=Array.from({length:3},(_,i)=>{const dur=8+i*1.4;
      return {wrap:`position:absolute; left:-75px; bottom:0; filter:drop-shadow(0 0 40px rgba(0,0,0,.7)); animation:nwWalkLady ${dur}s ease-in-out infinite; animation-delay:${(-i*2.7).toFixed(2)}s;`};});
    const twinkles=Array.from({length:8},(_,i)=>{const left=rnd(i*2.7)*84+8;const top=rnd(i*3.9)*40+8;const size=16+rnd(i*1.5)*20;const dur=2.5+rnd(i*4)*2;
      return {style:`position:absolute;left:${left}%;top:${top}%;font-family:'Cinzel',serif;font-size:${size}px;color:rgba(230,200,119,.5);animation:nwTwinkle ${dur}s ease-in-out infinite;animation-delay:${(-rnd(i*3)*dur).toFixed(2)}s;`};});
    return { root, corner, ladies, twinkles, subtitle: st.subtitle ?? "Le tapis rouge est à vous" };
  }
}
</script>
</body>
</html>
