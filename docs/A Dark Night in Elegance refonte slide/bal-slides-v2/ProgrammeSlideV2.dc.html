<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwRise { 0%{transform:translateY(20px);opacity:0} 12%{opacity:.85} 88%{opacity:.85} 100%{transform:translateY(-1080px);opacity:0} }
  @keyframes nwRowIn { 0%{transform:translateX(-24px);opacity:0} 100%{transform:translateX(0);opacity:1} }
  @keyframes nwGlowP { 0%,100%{text-shadow:0 0 50px rgba(201,169,97,.35),0 2px 4px rgba(0,0,0,.6)} 50%{text-shadow:0 0 90px rgba(201,169,97,.55),0 2px 4px rgba(0,0,0,.6)} }
  @keyframes nwActive { 0%,100%{box-shadow:inset 3px 0 0 #E6C877, 0 0 22px rgba(230,200,119,.28); background:rgba(120,26,38,.34)} 50%{box-shadow:inset 3px 0 0 #FFE9A8, 0 0 40px rgba(230,200,119,.5); background:rgba(120,26,38,.46)} }
  @keyframes nwTwinkle { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 20%, #211a10 0%, #0d0a06 56%, #060402 100%);"></div>
  <sc-for list="{{ particles }}" as="p" hint-placeholder-count="14"><div style="{{ p.style }}"></div></sc-for>

  <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.9); box-shadow:inset 0 0 60px rgba(0,0,0,.3); pointer-events:none;"></div>
  <div style="position:absolute; inset:30px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; padding:70px 120px;">
    <div style="font-family:'Cinzel',serif; font-weight:500; font-size:32px; letter-spacing:.5em; text-indent:.5em; color:#C9A961;">DÉROULÉ DE LA SOIRÉE</div>
    <div style="font-family:'Anton',sans-serif; font-size:130px; line-height:.95; text-transform:uppercase; letter-spacing:.02em; background:linear-gradient(180deg,#FFF6D8,#E6C877 52%,#8a6d2f); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:nwGlowP 6s ease-in-out infinite;">Programme</div>
    <div style="display:flex; align-items:center; gap:22px; margin:16px 0 40px;">
      <span style="width:90px; height:2px; background:rgba(214,178,95,.7);"></span>
      <span style="font-family:'Cinzel',serif; font-size:30px; color:#C9A961;">◆</span>
      <span style="width:90px; height:2px; background:rgba(214,178,95,.7);"></span>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 80px; width:100%;">
      <sc-for list="{{ rows }}" as="r" hint-placeholder-count="12">
        <div style="{{ r.row }}">
          <div style="font-family:'Cinzel',serif; font-weight:700; font-size:36px; color:#C9A961; letter-spacing:.04em; min-width:200px;">{{ r.time }}</div>
          <div style="font-family:'Playfair Display',serif; font-size:38px; color:#F5E6C8; flex:1;">{{ r.label }}</div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ config?: { program?: { time: string; label: string }[]; current_index?: number } }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  renderVals(){
    const st=this.props.state??{}; const cfg=st.config??{};
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"14px",height:"14px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 8px rgba(214,178,95,.6)"};
    const corner={tl:this.css({...cb,top:"44px",left:"44px"}),tr:this.css({...cb,top:"44px",right:"44px"}),bl:this.css({...cb,bottom:"44px",left:"44px"}),br:this.css({...cb,bottom:"44px",right:"44px"})};
    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
    const particles=Array.from({length:14},(_,i)=>{const size=2+rnd(i*1.3)*3;const left=rnd(i*2.1)*100;const dur=12+rnd(i*3.7)*8;const delay=-rnd(i*5.2)*dur;const y=300+rnd(i*1.9)*600;
      return {style:`position:absolute;left:${left}%;top:${y}px;width:${size}px;height:${size}px;border-radius:50%;background:radial-gradient(circle,#FFE9A8,rgba(201,169,97,.1));box-shadow:0 0 ${size*3}px rgba(230,200,119,.5);animation:nwRise ${dur}s linear infinite;animation-delay:${delay}s;`};});

    const def=[
      ["18h00","Arrivée des invités"],["18h45","Mur des stars & cocktail"],
      ["20h30","Installation en salle"],["21h30","Dancing stars"],
      ["21h40","Mot de bienvenue"],["21h50","Repas · vote Roi & Reine"],
      ["23h30","Intervention du Pasteur"],["00h30","Défilé — 1er passage"],
      ["01h15","Mot du Pasteur Wahou"],["02h20","Proclamation des résultats"],
      ["02h45","DJ · Jeux & karaoké"],["03h15","Ouverture du bal"],
    ];
    const prog=(cfg.program??def).map(p=>Array.isArray(p)?{time:p[0],label:p[1]}:p);

    const rows=prog.slice(0,12).map((p,i)=>{
      return { time:p.time, label:p.label,
        row:this.css({ display:"flex", alignItems:"center", gap:"28px", padding:"14px 20px", borderRadius:"5px",
          borderBottom:"1px solid rgba(214,178,95,.16)",
          animation: `nwRowIn .6s ease ${(0.4+i*0.05).toFixed(2)}s both` }) };
    });
    return { root, corner, particles, rows };
  }
}
</script>
</body>
</html>
