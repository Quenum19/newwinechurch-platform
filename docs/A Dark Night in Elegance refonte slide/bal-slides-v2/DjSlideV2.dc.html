<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwStrobe { 0%,100%{opacity:0} 48%{opacity:0} 50%{opacity:.5} 52%{opacity:0} }
  @keyframes nwStrobe2 { 0%,100%{opacity:0} 70%{opacity:0} 72%{opacity:.42} 74%{opacity:0} }
  @keyframes nwSpinDisc { to{transform:rotate(360deg)} }
  @keyframes nwEq { 0%,100%{height:26%} 50%{height:100%} }
  @keyframes nwGlowP { 0%,100%{text-shadow:0 0 60px rgba(201,169,97,.4),0 2px 4px rgba(0,0,0,.7)} 50%{text-shadow:0 0 130px rgba(201,169,97,.75),0 2px 4px rgba(0,0,0,.7)} }
</style>
</helmet>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 44%, #211a10 0%, #0d0a06 56%, #060402 100%);"></div>
  <div style="position:absolute; inset:0; background:rgba(230,200,119,.5); mix-blend-mode:screen; animation:nwStrobe 2.4s steps(1,end) infinite;"></div>
  <div style="position:absolute; inset:0; background:rgba(139,26,47,.6); mix-blend-mode:screen; animation:nwStrobe2 3.1s steps(1,end) infinite;"></div>

  <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.9); box-shadow:inset 0 0 70px rgba(0,0,0,.4); pointer-events:none;"></div>
  <div style="position:absolute; inset:30px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <!-- platine vinyle -->
    <div style="position:relative; width:280px; height:280px; margin-bottom:20px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg,#7E662E,#E6C877,#C9A961,#FFF6D8,#7E662E); box-shadow:0 0 50px rgba(230,200,119,.4);"></div>
      <div style="position:absolute; inset:8px; border-radius:50%; background:repeating-radial-gradient(circle at 50% 50%, #14100a 0 3px, #1c1710 3px 6px); animation:nwSpinDisc 3s linear infinite;"></div>
      <div style="position:absolute; inset:104px; border-radius:50%; background:linear-gradient(135deg,#8B1A2F,#5f1720); border:3px solid #E6C877;"></div>
      <div style="position:absolute; top:50%; left:50%; width:8px; height:8px; border-radius:50%; background:#0A0A0A; transform:translate(-50%,-50%);"></div>
    </div>

    <div style="font-family:'Cinzel',serif; font-weight:600; font-size:38px; letter-spacing:.5em; text-indent:.5em; color:#E6C877; text-shadow:0 2px 10px rgba(0,0,0,.8);">PLACE À LA MUSIQUE</div>
    <div style="display:flex; align-items:baseline; gap:40px;">
      <span style="font-family:'Anton',sans-serif; font-size:300px; line-height:.9; background:linear-gradient(180deg,#FFF6D8,#E6C877 50%,#8a6d2f); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:nwGlowP 4s ease-in-out infinite;">DJ</span>
      <sc-if value="{{ hasDj }}" hint-placeholder-val="{{ true }}"><span style="font-family:'Playfair Display',serif; font-style:italic; font-size:72px; color:#F5E6C8;">{{ djName }}</span></sc-if>
    </div>
    <!-- égaliseur -->
    <div style="display:flex; align-items:flex-end; gap:8px; height:90px; margin-top:26px;">
      <sc-for list="{{ eq }}" as="e" hint-placeholder-count="40"><div style="{{ e.style }}"></div></sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ config?: { dj_name?: string } }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  renderVals(){
    const st=this.props.state??{}; const cfg=st.config??{};
    const dj=cfg.dj_name ?? "";
    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"14px",height:"14px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 8px rgba(214,178,95,.6)"};
    const corner={tl:this.css({...cb,top:"44px",left:"44px"}),tr:this.css({...cb,top:"44px",right:"44px"}),bl:this.css({...cb,bottom:"44px",left:"44px"}),br:this.css({...cb,bottom:"44px",right:"44px"})};
    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
    const eq=Array.from({length:40},(_,i)=>{const dur=(0.5+rnd(i*2.3)*0.8).toFixed(2);const warm=i%3===0;
      return {style:`width:12px;height:40%;border-radius:5px;background:linear-gradient(180deg,${warm?'#8B1A2F':'#FFE9A8'},#C9A961);box-shadow:0 0 8px rgba(230,200,119,.4);animation:nwEq ${dur}s ease-in-out infinite;animation-delay:${(-rnd(i*5)*1).toFixed(2)}s;`};});
    return { root, corner, eq, hasDj: !!dj, djName: dj };
  }
}
</script>
</body>
</html>
