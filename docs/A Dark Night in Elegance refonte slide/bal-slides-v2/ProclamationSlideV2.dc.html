<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
  @keyframes nwConfetti { 0%{transform:translateY(-80px) rotateZ(0deg) rotateX(0deg);opacity:0} 8%{opacity:1} 100%{transform:translateY(1180px) rotateZ(720deg) rotateX(540deg);opacity:.9} }
  @keyframes nwSway { 0%,100%{margin-left:-26px} 50%{margin-left:26px} }
  @keyframes nwFlash { 0%{opacity:0} 15%{opacity:.85} 100%{opacity:0} }
  @keyframes nwCrownShine { 0%,100%{filter:drop-shadow(0 0 10px rgba(230,200,119,.5))} 50%{filter:drop-shadow(0 0 26px rgba(255,233,168,.9))} }
  @keyframes nwFacet { 0%,100%{opacity:.25} 50%{opacity:.9} }
  @keyframes nwRiseP { 0%{transform:translateY(60px) scale(.94);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes nwGlowP { 0%,100%{text-shadow:0 0 60px rgba(201,169,97,.35),0 2px 4px rgba(0,0,0,.6)} 50%{text-shadow:0 0 100px rgba(201,169,97,.55),0 2px 4px rgba(0,0,0,.6)} }
  @keyframes nwHalo { 0%,100%{opacity:.5; transform:scale(1)} 50%{opacity:.85; transform:scale(1.06)} }
</style>
</helmet>

<template id="__bundler_thumbnail" data-bg-color="#12080a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#12080a"/>
    <path d="M470 300 L450 170 L560 260 L600 130 L640 260 L750 170 L730 300 Z" fill="#E6C877"/>
    <rect x="472" y="300" width="256" height="40" rx="8" fill="#C9A961"/>
    <circle cx="470" cy="560" r="90" fill="none" stroke="#C9A961" stroke-width="10"/>
    <circle cx="730" cy="560" r="90" fill="none" stroke="#C9A961" stroke-width="10"/>
  </svg>
</template>

<div style="{{ root }}">
  <div style="position:absolute; inset:0; background:radial-gradient(120% 100% at 50% 20%, #2a0f14 0%, #12080a 55%, #060402 100%);"></div>
  <div style="position:absolute; inset:0; background:radial-gradient(46% 46% at 50% 40%, rgba(230,200,119,.14), transparent 70%); animation:nwHalo 5s ease-in-out infinite;"></div>
  <div style="position:absolute; inset:0; opacity:0; background:#FFF6D8; animation:nwFlash 1.3s ease-out 1; pointer-events:none;"></div>

  <!-- confettis -->
  <sc-for list="{{ confetti }}" as="c" hint-placeholder-count="30"><div style="{{ c.wrap }}"><div style="{{ c.piece }}"></div></div></sc-for>

  <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.9); box-shadow:inset 0 0 70px rgba(0,0,0,.32); pointer-events:none;"></div>
  <div style="position:absolute; inset:30px; border:1px solid rgba(214,178,95,.5); pointer-events:none;"></div>
  <div style="{{ corner.tl }}"></div><div style="{{ corner.tr }}"></div><div style="{{ corner.bl }}"></div><div style="{{ corner.br }}"></div>

  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <!-- couronne SVG custom -->
    <div style="animation:nwCrownShine 4s ease-in-out infinite;">
      <svg width="200" height="140" viewBox="0 0 200 140">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF6D8"></stop><stop offset=".45" stop-color="#E6C877"></stop><stop offset="1" stop-color="#7E662E"></stop></linearGradient>
          <linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E6C877"></stop><stop offset="1" stop-color="#B08A3F"></stop></linearGradient>
        </defs>
        <path d="M28 116 L20 44 L64 82 L100 24 L136 82 L180 44 L172 116 Z" fill="url(#cg)" stroke="#7E662E" stroke-width="1.5"></path>
        <rect x="30" y="112" width="140" height="18" rx="4" fill="url(#cg2)" stroke="#7E662E" stroke-width="1.5"></rect>
        <circle cx="100" cy="18" r="9" fill="#8B1A2F" stroke="#FFE9A8" stroke-width="2"></circle>
        <circle cx="20" cy="40" r="6" fill="#8B1A2F" stroke="#FFE9A8" stroke-width="1.5"></circle>
        <circle cx="180" cy="40" r="6" fill="#8B1A2F" stroke="#FFE9A8" stroke-width="1.5"></circle>
        <circle cx="64" cy="120" r="3.5" fill="#8B1A2F"></circle><circle cx="100" cy="120" r="3.5" fill="#8B1A2F"></circle><circle cx="136" cy="120" r="3.5" fill="#8B1A2F"></circle>
        <polygon points="100,24 136,82 64,82" fill="rgba(255,246,216,.35)" style="animation:nwFacet 3s ease-in-out infinite"></polygon>
      </svg>
    </div>
    <div style="font-family:'Cinzel',serif; font-weight:700; font-size:44px; letter-spacing:.4em; text-indent:.4em; color:#E6C877; margin-top:8px; animation:nwGlowP 5s ease-in-out infinite;">VOS MAJESTÉS 2026</div>
    <div style="font-family:'Playfair Display',serif; font-style:italic; font-size:30px; color:#F0E6CF; margin-top:6px;">couronnés par vos votes</div>

    <!-- duo pédestaux 3D -->
    <div style="display:flex; align-items:flex-start; justify-content:center; gap:180px; margin-top:34px; perspective:1600px;">
      <sc-for list="{{ royals }}" as="r" hint-placeholder-count="2">
        <div style="{{ r.pedestal }}">
          <div style="font-family:'Cinzel',serif; font-weight:600; font-size:30px; letter-spacing:.38em; text-indent:.38em; color:{{ r.labelColor }};">{{ r.label }}</div>
          <div style="position:relative; width:380px; height:380px; margin:20px 0;">
            <div style="position:absolute; top:-88px; left:50%; transform:translateX(-50%); animation:nwCrownShine 4s ease-in-out infinite;">
              <svg width="130" height="90" viewBox="0 0 200 140"><path d="M28 116 L20 44 L64 82 L100 24 L136 82 L180 44 L172 116 Z" fill="url(#cg)" stroke="#7E662E" stroke-width="1.5"></path><rect x="30" y="112" width="140" height="18" rx="4" fill="url(#cg2)" stroke="#7E662E" stroke-width="1.5"></rect><circle cx="100" cy="18" r="9" fill="#8B1A2F" stroke="#FFE9A8" stroke-width="2"></circle></svg>
            </div>
            <div style="position:absolute; inset:-16px; border-radius:50%; background:conic-gradient(from 0deg,#7E662E,#FFE9A8,#C9A961,#FFF6D8,#7E662E); box-shadow:0 0 50px rgba(230,200,119,.55);"></div>
            <div style="position:absolute; inset:-3px; border-radius:50%; background:#0A0A0A;"></div>
            <div style="{{ r.photo }}"></div>
            <div style="position:absolute; inset:0; border-radius:50%; border:3px solid rgba(139,26,47,.7);"></div>
            <sc-if value="{{ r.noPhoto }}" hint-placeholder-val="{{ true }}">
              <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Great Vibes',cursive; font-size:150px; color:rgba(230,200,119,.85);">{{ r.initial }}</div>
            </sc-if>
          </div>
          <div style="font-family:'Anton',sans-serif; font-size:72px; letter-spacing:.02em; color:#F5E6C8; text-shadow:0 0 40px rgba(201,169,97,.4);">{{ r.name }}</div>
          <div style="width:280px; height:10px; border-radius:99px; background:rgba(214,178,95,.16); margin-top:18px; overflow:hidden;">
            <div style="height:100%; width:{{ r.barPct }}; border-radius:99px; background:linear-gradient(90deg,#FFE9A8,#C9A961); box-shadow:0 0 14px rgba(230,200,119,.7); transition:width 1.4s cubic-bezier(.16,1,.3,1);"></div>
          </div>
          <div style="font-family:'Cinzel',serif; font-weight:600; font-size:34px; letter-spacing:.14em; color:#E6C877; margin-top:14px;">{{ r.votesDisplay }} <span style="font-size:20px; color:#D9CBB0; letter-spacing:.2em;">VOTES</span></div>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;state&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ results?: { roi?: { name?: string; votes?: number; photo?: string }; reine?: { name?: string; votes?: number; photo?: string } }; phase?: string }&quot;}}">
class Component extends DCLogic {
  css(o){ return Object.entries(o).map(([k,v])=>`${k.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())}:${v}`).join(";"); }
  state = { p: 0 };
  componentDidMount(){
    const t0=performance.now(), dur=1500;
    const tick=(t)=>{const k=Math.min(1,(t-t0)/dur);this.setState({p:1-Math.pow(1-k,3)});if(k<1)this._raf=requestAnimationFrame(tick);};
    this._raf=requestAnimationFrame(tick);
  }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); }
  renderVals(){
    const st = this.props.state ?? {};
    const res = st.results ?? {};
    const roi = res.roi ?? { name:"Emmanuel N.", votes:1240, photo:"" };
    const reine = res.reine ?? { name:"Grâce K.", votes:1310, photo:"" };
    const maxV = Math.max(roi.votes||0, reine.votes||0, 1);
    const p = this.state.p;

    const root="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0A0A; color:#F5E6C8; font-family:'Cormorant Garamond',serif;";
    const cb={position:"absolute",width:"14px",height:"14px",background:"#E6C877",transform:"rotate(45deg)",boxShadow:"0 0 8px rgba(214,178,95,.6)"};
    const corner={tl:this.css({...cb,top:"44px",left:"44px"}),tr:this.css({...cb,top:"44px",right:"44px"}),bl:this.css({...cb,bottom:"44px",left:"44px"}),br:this.css({...cb,bottom:"44px",right:"44px"})};

    const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
    const cols=["#FFE9A8","#E6C877","#C9A961","#8B1A2F","#F5E6C8"];
    const confetti=Array.from({length:30},(_,i)=>{const left=rnd(i*2.3)*100;const dur=5+rnd(i*1.7)*4;const delay=-rnd(i*3.1)*dur;const w=6+rnd(i*4.4)*8;const h=w*(1.4+rnd(i*2)*.8);const col=cols[i%cols.length];const swayDur=1.6+rnd(i*5)*1.8;
      return {wrap:`position:absolute;top:-80px;left:${left}%;animation:nwSway ${swayDur}s ease-in-out infinite;`,
        piece:`width:${w}px;height:${h}px;background:${col};opacity:.9;border-radius:1px;box-shadow:0 0 6px rgba(0,0,0,.3);animation:nwConfetti ${dur}s linear infinite;animation-delay:${delay}s;transform-style:preserve-3d;`};});

    const mk=(d, label, labelColor, tz, ry)=>{
      const votes=d.votes||0;
      return {
        pedestal:this.css({ display:"flex", flexDirection:"column", alignItems:"center", transformStyle:"preserve-3d",
          transform:`translateZ(${tz}px) rotateY(${ry}deg)`, animation:"nwRiseP .9s cubic-bezier(.16,1,.3,1) both" }),
        label, labelColor,
        photo: this.css({ position:"absolute", inset:"0", borderRadius:"50%", backgroundImage:d.photo?`url("${d.photo}")`:"none",
          backgroundColor:"#160d10", backgroundSize:"cover", backgroundPosition:"center" }),
        noPhoto: !d.photo,
        initial: (d.name||"?").trim().charAt(0).toUpperCase(),
        name: d.name || "—",
        barPct: ((votes/maxV)*100*p).toFixed(1)+"%",
        votesDisplay: Math.round(votes*p).toLocaleString('fr-FR'),
      };
    };
    const royals=[ mk(roi,"LE ROI","#E6C877", 40, 6), mk(reine,"LA REINE","#F3E2B6", 40, -6) ];

    return { root, corner, confetti, royals };
  }
}
</script>
</body>
</html>
