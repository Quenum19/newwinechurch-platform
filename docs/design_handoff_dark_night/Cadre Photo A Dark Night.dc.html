<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="./image-slot.js"></script>
<script src="./doc-page.js"></script>
<style>
  @keyframes nwShimmer { 0%,100%{opacity:.85} 50%{opacity:1} }
  doc-page:not(:defined){ visibility:hidden; }
  * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @media print {
    * { animation-delay:-99s !important; animation-duration:.001s !important;
        animation-iteration-count:1 !important; animation-fill-mode:both !important;
        animation-play-state:running !important; transition-duration:0s !important; }
  }
</style>
</helmet>

<doc-page width="1350px" height="900px" margin="0">
<div id="cadre" style="{{ frameStyle }}">
  <image-slot id="bal-photo" shape="rect" fit="cover" placeholder="Déposez la photo du bal ici" style="position:absolute; inset:0;"></image-slot>

  <!-- ══ overlay décoratif (transparent au drop) ══ -->
  <div style="position:absolute; inset:0; pointer-events:none;">

    <!-- scrims lisibilité -->
    <div style="{{ scrimLeft }}"></div>
    <div style="{{ scrimTR }}"></div>
    <div style="{{ scrimBottom }}"></div>

    <!-- wordmark vertical · bord gauche -->
    <div style="position:absolute; left:40px; top:50%; transform:translateY(-50%) rotate(180deg); writing-mode:vertical-rl; white-space:nowrap; font-family:'Cinzel',serif; font-weight:600; font-size:15px; letter-spacing:.3em; color:#e6c877; text-shadow:0 1px 5px rgba(0,0,0,.95), 0 0 3px rgba(0,0,0,.7);">NEW&nbsp;WINE&nbsp;CHURCH&nbsp;&nbsp;<span style="color:#eecf80;">✦</span>&nbsp;&nbsp;MAISON&nbsp;DE&nbsp;LA&nbsp;DESTIN&Eacute;E</div>

    <!-- double filet or -->
    <div style="position:absolute; inset:22px; border:2px solid rgba(214,178,95,.95); box-shadow:0 0 22px rgba(0,0,0,.35), inset 0 0 40px rgba(0,0,0,.15);"></div>
    <div style="position:absolute; inset:30px; border:1px solid rgba(214,178,95,.5);"></div>

    <!-- ornements de coin (diamants) -->
    <div style="position:absolute; top:20px; left:20px; width:14px; height:14px; background:#e6c877; transform:rotate(45deg); box-shadow:0 0 8px rgba(214,178,95,.6);"></div>
    <div style="position:absolute; top:20px; right:20px; width:14px; height:14px; background:#e6c877; transform:rotate(45deg); box-shadow:0 0 8px rgba(214,178,95,.6);"></div>
    <div style="position:absolute; bottom:20px; left:20px; width:14px; height:14px; background:#e6c877; transform:rotate(45deg); box-shadow:0 0 8px rgba(214,178,95,.6);"></div>
    <div style="position:absolute; bottom:20px; right:20px; width:14px; height:14px; background:#e6c877; transform:rotate(45deg); box-shadow:0 0 8px rgba(214,178,95,.6);"></div>

    <!-- ══ badge date · haut droite ══ -->
    <div style="position:absolute; top:52px; right:60px; display:flex; flex-direction:column; align-items:center;">
      <div style="font-family:'Cinzel',serif; font-weight:800; font-size:82px; line-height:.9; color:#e9c976; text-shadow:0 2px 3px rgba(0,0,0,.55), 0 0 18px rgba(214,178,95,.35); letter-spacing:.01em;">{{ dateNumber }}</div>
      <div style="margin-top:6px; padding:5px 20px; background:linear-gradient(180deg,#8a2531,#5f1720); border:1px solid rgba(214,178,95,.7); font-family:'Cinzel',serif; font-weight:600; font-size:17px; letter-spacing:.34em; text-indent:.34em; color:#f3e2b6; box-shadow:0 3px 8px rgba(0,0,0,.4);">{{ dateMonth }}</div>
    </div>

    <!-- ══ lockup événement · bas droite ══ -->
    <div style="position:absolute; bottom:60px; right:64px; display:flex; align-items:center; gap:24px;">
      <div style="font-size:122px; line-height:1; color:#e6c877; text-shadow:0 0 28px rgba(214,178,95,.55), 0 2px 4px rgba(0,0,0,.6); animation:nwShimmer 4s ease-in-out infinite;">★</div>
      <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end;">
        <div style="font-family:'Cinzel',serif; font-weight:600; font-size:23px; letter-spacing:.26em; color:#f5edd9; text-shadow:0 1px 4px rgba(0,0,0,.85); margin-right:-.26em;">BAL &amp; DINE GALA</div>
        <div style="font-family:'Cinzel',serif; font-weight:800; font-size:47px; letter-spacing:.03em; color:#ecce7d; text-shadow:0 2px 5px rgba(0,0,0,.8); margin-top:4px; margin-right:-.03em;">A DARK NIGHT</div>
        <div style="display:flex; align-items:center; justify-content:flex-end; gap:12px; margin:5px 0;">
          <span style="width:46px; height:1px; background:rgba(214,178,95,.75);"></span>
          <span style="font-family:'Cinzel',serif; font-weight:500; font-size:18px; letter-spacing:.3em; text-indent:.3em; color:#dcb765;">IN</span>
          <span style="width:46px; height:1px; background:rgba(214,178,95,.75);"></span>
        </div>
        <div style="font-family:'Great Vibes',cursive; font-size:82px; line-height:.9; padding-bottom:6px; color:#eecf80; text-shadow:0 2px 6px rgba(0,0,0,.7), 0 0 18px rgba(214,178,95,.4);">Elegance</div>
      </div>
    </div>

    <!-- ══ logo · bas gauche ══ -->
    <img src="assets/logo-newwine.png" alt="New Wine" style="position:absolute; bottom:48px; left:104px; width:152px; height:152px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,.75));">
    <template id="__bundler_thumbnail" data-bg-color="#0b0907">
      <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="300" height="200" fill="#0b0907"/>
        <rect x="12" y="12" width="276" height="176" fill="none" stroke="#d6b25f" stroke-width="2"/>
        <text x="150" y="112" text-anchor="middle" font-family="Georgia,serif" font-size="60" fill="#e9c976">★</text>
      </svg>
    </template>

  </div>
</div>
</doc-page>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1350,&quot;height&quot;:900},&quot;format&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Paysage 3:2&quot;,&quot;options&quot;:[&quot;Paysage 3:2&quot;,&quot;Carré 1:1&quot;,&quot;Portrait 4:5&quot;,&quot;Story 9:16&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Format&quot;},&quot;dateNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;24&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Date&quot;},&quot;dateMonth&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;JUILLET&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Date&quot;},&quot;showScrim&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Lisibilité&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const format = this.props.format ?? "Paysage 3:2";
    const dims = {
      "Paysage 3:2": [1350, 900],
      "Carré 1:1":   [1080, 1080],
      "Portrait 4:5":[1080, 1350],
      "Story 9:16":  [1080, 1920],
    }[format] || [1350, 900];
    const [w, h] = dims;

    const showScrim = this.props.showScrim ?? true;
    const on = (g) => showScrim ? g : "transparent";

    const frameStyle = [
      "position:relative",
      `width:${w}px`, `height:${h}px`,
      "overflow:hidden",
      "background:#0b0907",
      "font-family:'Cormorant Garamond',serif",
    ].join(";");

    const scrimTR = "position:absolute; top:0; right:0; width:36%; height:26%; background:" +
      on("radial-gradient(120% 120% at 100% 0%, rgba(0,0,0,.46), transparent 72%)") + ";";
    const scrimBottom = "position:absolute; left:0; right:0; bottom:0; height:46%; background:" +
      on("linear-gradient(0deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.86) 8%, rgba(0,0,0,.5) 42%, transparent 100%)") + ";";
    const scrimLeft = "position:absolute; left:0; top:0; bottom:0; width:9%; background:" +
      on("linear-gradient(90deg, rgba(0,0,0,.4) 0%, transparent 100%)") + ";";

    return {
      frameStyle, scrimTR, scrimBottom, scrimLeft,
      dateNumber: this.props.dateNumber ?? "24",
      dateMonth: this.props.dateMonth ?? "JUILLET",
    };
  }
}
</script>
</body>
</html>
